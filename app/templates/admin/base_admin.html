<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PricePulse Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   DESIGN SYSTEM
========================= */
:root{
--bg:#f4f6fb;
--card:#ffffff;
--primary:#4f46e5;
--sidebar:#0f172a;
--sidebar-light:#1e293b;
--text:#0f172a;
--muted:#64748b;
--border:#e5e7eb;
--radius:16px;
}

/* =========================
   BASE
========================= */
body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
width:260px;
height:100vh;
position:fixed;
top:0;
left:0;
background:linear-gradient(180deg,var(--sidebar),var(--sidebar-light));
padding:24px 18px;
color:white;
display:flex;
flex-direction:column;
}

.brand{
font-size:22px;
font-weight:800;
margin-bottom:25px;
}

.brand span{
color:#38bdf8;
}

/* NAV LINKS */
.side-link{
display:flex;
align-items:center;
gap:10px;
padding:12px 14px;
border-radius:10px;
color:#cbd5e1;
text-decoration:none;
font-weight:600;
margin-bottom:6px;
transition:.2s;
}

.side-link:hover{
background:rgba(255,255,255,.08);
color:white;
}

.side-link.active{
background:rgba(255,255,255,.12);
color:white;
}

/* =========================
   MAIN
========================= */
.main{
margin-left:260px;
padding:24px 30px;
}

/* =========================
   TOPBAR
========================= */
.topbar{
background:white;
border-radius:var(--radius);
padding:16px 22px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.05);
display:flex;
justify-content:space-between;
align-items:center;
}

.topbar-title{
font-weight:700;
font-size:18px;
}

.user-box{
text-align:right;
font-size:14px;
}

/* =========================
   CARDS
========================= */
.card-box{
background:var(--card);
padding:20px;
border-radius:var(--radius);
box-shadow:0 10px 25px rgba(0,0,0,.05);
transition:.2s;
}

.card-box:hover{
transform:translateY(-3px);
}

/* =========================
   TABLE
========================= */
.table{
background:white;
border-radius:12px;
overflow:hidden;
}

.table thead{
background:#0f172a;
color:white;
}

/* =========================
   BUTTONS
========================= */
.btn-primary{
background:var(--primary);
border:none;
}

.btn{
border-radius:10px;
font-weight:600;
}

/* =========================
   ALERTS
========================= */
.toast-box{
position:fixed;
top:20px;
right:20px;
z-index:9999;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:992px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:15px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->
{% include "admin/sidebar.html" %}

<!-- MAIN CONTENT -->
<div class="main">
    <!-- FLASH MESSAGES -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="toast-box">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} shadow mb-2">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- PAGE CONTENT -->
    {% block content %}{% endblock %}

</div>

</body>
</html>
